services:
  # Backend Web Service
  - type: web
    name: medinova-backend
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Set in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # Set in Render Dashboard

