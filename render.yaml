services:
  - type: web
    name: medinova-backend
    env: node
    plan: free
    region: ohio
    # Look into the backend folder for package.json
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Requires manual entry in Render dashboard
